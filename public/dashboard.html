<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – VeerTx Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; color: #ffffff; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    /* Sidebar */
    .sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
    .sidebar-logo { color: #00ff88; font-size: 14px; font-weight: 600; padding: 24px 20px; border-bottom: 1px solid #1a1a1a; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .sidebar-nav .nav-item { display: block; padding: 8px 12px; font-size: 14px; color: #666666; border-radius: 4px; cursor: pointer; transition: color 0.15s, background 0.15s; margin-bottom: 2px; }
    .sidebar-nav .nav-item:hover { color: #ffffff; }
    .sidebar-nav .nav-item.active { color: #ffffff; background: #1a1a1a; }
    .sidebar-bottom { padding: 20px; border-top: 1px solid #1a1a1a; }
    .sidebar-bottom .dev-email { color: #444444; font-size: 12px; margin-bottom: 12px; word-break: break-all; }
    .sidebar-bottom .signout-btn { background: transparent; border: none; color: #666666; font-size: 13px; font-family: inherit; cursor: pointer; padding: 0; transition: color 0.15s; }
    .sidebar-bottom .signout-btn:hover { color: #ffffff; }

    /* Main */
    .main { margin-left: 240px; padding: 40px; }
    .page-header { border-bottom: 1px solid #1a1a1a; padding-bottom: 24px; margin-bottom: 32px; }
    .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
    .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; padding: 20px 24px; }
    .stat-card .label { font-size: 12px; color: #666666; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .status-dot { display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .stat-card .status-text { vertical-align: middle; font-size: 16px; font-weight: 600; }

    /* Section title */
    .section-title { font-size: 14px; font-weight: 600; color: #888888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

    /* Chart */
    .chart-section { margin-bottom: 24px; }
    .chart-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; padding: 16px; }

    /* Keys */
    .keys-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .generate-btn { background: #00ff88; color: #000000; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 4px; border: none; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    .generate-btn:hover { opacity: 0.85; }
    .keys-table { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; font-weight: 500; color: #444444; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 20px; border-bottom: 1px solid #1a1a1a; }
    td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid #1a1a1a; }
    tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-badge .dot.active { background: #00ff88; }
    .status-badge .dot.revoked { background: #ef4444; }
    .status-badge.active { color: #00ff88; }
    .status-badge.revoked { color: #ef4444; }
    .revoke-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; font-size: 12px; padding: 4px 10px; border-radius: 4px; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    .revoke-btn:hover { opacity: 0.7; }
    .empty-row td { color: #444444; text-align: center; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; padding: 40px; max-width: 480px; width: 100%; }
    .modal h3 { color: #ef4444; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
    .modal .key-display { background: #000000; border: 1px solid #1a1a1a; padding: 16px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; word-break: break-all; margin-bottom: 20px; min-height: 48px; }
    .modal .btn-row { display: flex; gap: 10px; }
    .modal .copy-btn { background: #00ff88; color: #000000; border: none; padding: 8px 20px; border-radius: 4px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .modal .copy-btn:hover { opacity: 0.85; }
    .modal .close-btn { background: transparent; color: #666666; border: 1px solid #1a1a1a; padding: 8px 20px; border-radius: 4px; font-family: inherit; font-size: 13px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .modal .close-btn:hover { color: #ffffff; border-color: #333333; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">VeerTx Agents</div>
    <nav class="sidebar-nav">
      <div class="nav-item active">Overview</div>
      <div class="nav-item">API Keys</div>
      <div class="nav-item" style="display:none">Usage</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="dev-email" id="devEmail"></div>
      <button class="signout-btn" id="logoutBtn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <div class="page-header">
      <h1>Overview</h1>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Swaps (7 Days)</div>
        <div class="value" id="totalSwaps">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Keys</div>
        <div class="value" id="activeKeys">0</div>
      </div>
      <div class="stat-card" style="display:none">
        <div class="label">Referral Fees</div>
        <div class="value">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value"><span class="status-dot"></span><span class="status-text">Operational</span></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="section-title">Swaps — Last 7 Days</div>
      <div class="chart-card">
        <canvas id="swapChart" height="120"></canvas>
      </div>
    </div>

    <div class="keys-section">
      <div class="keys-header">
        <div class="section-title" style="margin-bottom:0">API Keys</div>
        <button class="generate-btn" id="generateBtn">Generate New Key</button>
      </div>
      <div class="keys-table">
        <table>
          <thead>
            <tr><th>Prefix</th><th>Status</th><th>Created</th><th>Action</th></tr>
          </thead>
          <tbody id="keysBody">
            <tr class="empty-row"><td colspan="4">No API keys yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Save this key. You will never see it again.</h3>
      <div class="key-display" id="keyDisplay"></div>
      <div class="btn-row">
        <button class="copy-btn" id="copyBtn">Copy</button>
        <button class="close-btn" id="closeModal">Close</button>
      </div>
    </div>
  </div>

  <script>
    let swapChart = null;

    async function init() {
      try {
        const res = await fetch('/v1/portal/keys', { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        document.body.style.display = '';
        renderKeys(data.data.keys);
        loadStats();
      } catch {
        window.location.href = '/login';
      }
    }

    function renderKeys(keys) {
      const active = keys.filter(k => k.status === 'active');
      document.getElementById('activeKeys').textContent = active.length;
      const tbody = document.getElementById('keysBody');
      if (keys.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No API keys yet</td></tr>';
        return;
      }
      tbody.innerHTML = keys.map(k => `
        <tr>
          <td>${esc(k.prefix)}</td>
          <td><span class="status-badge ${k.status}"><span class="dot ${k.status}"></span>${k.status}</span></td>
          <td>${k.created_at}</td>
          <td>${k.status === 'active' ? `<button class="revoke-btn" onclick="revokeKey(${k.id})">Revoke</button>` : '\u2014'}</td>
        </tr>
      `).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function loadStats() {
      try {
        const res = await fetch('/v1/portal/stats', { credentials: 'same-origin' });
        if (!res.ok) return;
        const data = await res.json();
        const stats = data.data.stats;
        const total = stats.reduce((s, d) => s + d.count, 0);
        document.getElementById('totalSwaps').textContent = total;

        const ctx = document.getElementById('swapChart').getContext('2d');
        if (swapChart) swapChart.destroy();
        swapChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: stats.map(d => d.date),
            datasets: [{
              data: stats.map(d => d.count),
              backgroundColor: '#00ff88',
              borderRadius: 2,
              maxBarThickness: 40,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#444444', font: { family: 'Inter', size: 11 } }, grid: { color: '#1a1a1a' }, border: { color: '#1a1a1a' } },
              y: { beginAtZero: true, ticks: { color: '#444444', font: { family: 'Inter', size: 11 }, stepSize: 1 }, grid: { color: '#1a1a1a' }, border: { color: '#1a1a1a' } },
            },
          },
        });
      } catch {}
    }

    async function revokeKey(id) {
      if (!confirm('Revoke this API key?')) return;
      await fetch(`/v1/portal/keys/${id}`, { method: 'DELETE', credentials: 'same-origin' });
      init();
    }

    document.getElementById('generateBtn').addEventListener('click', async () => {
      try {
        const res = await fetch('/v1/portal/keys', { method: 'POST', credentials: 'same-origin' });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('keyDisplay').textContent = data.data.apiKey;
          document.getElementById('modal').classList.add('active');
          init();
        }
      } catch {}
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('keyDisplay').textContent);
      document.getElementById('copyBtn').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('copyBtn').textContent = 'Copy'; }, 2000);
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('keyDisplay').innerText = '';
      document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/v1/portal/auth/logout', { method: 'POST', credentials: 'same-origin' });
      window.location.href = '/login';
    });

    init();
  </script>
</body>
</html>

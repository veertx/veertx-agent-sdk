<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – VeerTx Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ffffff; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #111111; border: 1px solid #222222; border-radius: 2px; padding: 48px; width: 100%; max-width: 420px; }
    .logo { color: #00ff88; font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 32px; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
    .subtitle { color: #888888; font-size: 13px; text-align: center; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #888888; margin-bottom: 8px; }
    input[type="email"] { width: 100%; background: #0a0a0a; border: 1px solid #222222; color: #ffffff; padding: 12px; border-radius: 2px; font-family: inherit; font-size: 14px; outline: none; margin-bottom: 20px; }
    input[type="email"]:focus { border-color: #00ff88; }
    .turnstile-wrap { margin-bottom: 20px; }
    .submit-btn { width: 100%; background: #00ff88; color: #0a0a0a; border: none; padding: 14px; border-radius: 2px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; text-align: center; }
    .msg.error { color: #ff4444; }
    .msg.success { color: #00ff88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VeerTx Agents</div>
    <h1>Developer Login</h1>
    <p class="subtitle">Enter your email to receive a magic login link</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
      <div class="turnstile-wrap">
        <div class="cf-turnstile" data-sitekey="TURNSTILE_SITE_KEY_PLACEHOLDER"></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send Login Link</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';

      const email = document.getElementById('email').value.trim();
      const turnstileToken = typeof turnstile !== 'undefined' ? turnstile.getResponse() : '';

      if (!turnstileToken) {
        msg.textContent = 'Please complete the verification.';
        msg.classList.add('error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/v1/portal/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, turnstileToken }),
        });
        const data = await res.json();

        if (res.ok) {
          msg.textContent = 'Check your email! Login link sent.';
          msg.classList.add('success');
          form.style.display = 'none';
        } else {
          msg.textContent = data.error?.message || 'Something went wrong.';
          msg.classList.add('error');
        }
      } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.classList.add('error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Login Link';
      }
    });
  </script>
</body>
</html>
